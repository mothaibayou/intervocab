    explanation_vn: "Hoàn toàn bị kiểm soát bởi ai đó.",
    equivalent: "Bị người khác kiểm soát hoàn toàn",
  },
  {
    title: "Wrap your head around something",
    explanation: "Manage to understand something complex or confusing.",
    example: "I still can't wrap my head around quantum physics.",
    explanation_vn: "Cố gắng hiểu điều gì đó phức tạp hoặc khó hiểu.",
    equivalent: "Hiểu ra, nắm được vấn đề",
  },
];

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

// Build grid
var grid = document.getElementById("idiom-grid");
idioms.forEach(function(idiom, idx) {
  var cell = document.createElement("div");
  cell.className = "idiom-cell";

  var num = document.createElement("span");
  num.className = "idiom-num";
  num.textContent = (idx + 1) + ".";

  var trigger = document.createElement("span");
  trigger.className = "idiom-trigger";
  trigger.textContent = idiom.title;
  trigger.dataset.idx = idx;

  cell.appendChild(num);
  cell.appendChild(trigger);
  grid.appendChild(cell);
});

var backdrop = document.getElementById("backdrop");
var popup = document.getElementById("popup");
var closeBtn = document.getElementById("close-btn");
var activeIdx = -1;

function openCard(idx) {
  var idiom = idioms[idx];
  activeIdx = idx;
  document.getElementById("card-idiom").textContent = idiom.title;
  document.getElementById("card-exp-en").textContent = idiom.explanation;
  document.getElementById("card-example").textContent = '"' + idiom.example + '"';
  document.getElementById("card-exp-vn").textContent = idiom.explanation_vn;
  var equivBlock = document.getElementById("equiv-block");
  var equivEl = document.getElementById("card-equiv");
  if (idiom.equivalent) {
    equivEl.textContent = idiom.equivalent;
    equivBlock.style.display = "";
  } else {
    equivBlock.style.display = "none";
  }
  backdrop.classList.add("active");
  popup.classList.add("active");
}

function closeCard() {
  activeIdx = -1;
  backdrop.classList.remove("active");
  popup.classList.remove("active");
}

grid.addEventListener("click", function(e) {
  var trigger = e.target.closest(".idiom-trigger");
  if (!trigger) return;
  var idx = parseInt(trigger.dataset.idx);
  if (activeIdx === idx) {
    closeCard();
  } else {
    openCard(idx);
  }
});

closeBtn.addEventListener("click", function(e) {
  e.stopPropagation();
  closeCard();
});

backdrop.addEventListener("click", closeCard);

document.addEventListener("keydown", function(e) {
  if (e.key === "Escape" && popup.classList.contains("active")) {
    closeCard();
  }
});
</script>
</body>
</html>
