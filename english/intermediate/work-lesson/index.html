<!-- This is the index.html page for the intervocab/english/intermediate/work-lesson folder.  calls work-lesson/work-lesson.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Beginner – LangPower</title>
  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(to right, #f4f1ea, #e6dfd2);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 80px auto;
      background: #ede8dc;
      padding: 50px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }
    .back-btn {
      float: left;
      background: none;
      border: none;
      font-size: 18px;
      color: #6b5c3e;
      cursor: pointer;
      padding: 0;
    }
    .back-btn:hover { color: #4a3f35; }
    .header {
      clear: both;
      text-align: center;
    }
    h1 {
      font-size: 42px;
      color: #4a3f35;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 18px;
      color: #5a4a3a;
      font-weight: 500;
      line-height: 1.25;
      margin-bottom: 6px;
    }
    .domain {
      font-size: 14px;
      color: #6e5d4d;
      margin-bottom: 30px;
    }
    .section-heading {
      font-size: 22px;
      color: #5c4a3d;
      margin-bottom: 20px;
    }
    .lesson-list {
      list-style: none;
      padding: 0;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      text-align: center;
    }
    .lesson-list li {
      padding: 8px 4px;
    }
    .lesson-list a {
      font-size: 15px;
      text-decoration: none;
      color: #6f5636;
      font-weight: bold;
    }
    .lesson-list a:hover {
      color: #4a3f35;
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      .lesson-list {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
<div class="container">
  <button class="back-btn" onclick="window.location.href='../index.html'">← Back</button>
  <div class="header">
    <h1>LangPower</h1>
    <p class="subtitle">A Simple, Powerful Way<br>to Learn Languages</p>
    <p class="domain">langpower.app</p>
  </div>
  <p class="section-heading">🇺🇸 English — Intermediate</p>
  <ul class="lesson-list">
    <li><a href="work-lesson/work-lesson.html">work-lesson</a></li>
  </ul>
</div>
</body>
</html>
