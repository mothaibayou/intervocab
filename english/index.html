<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>English Lessons – LangPower</title>
  <style>
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(to right, #f4f1ea, #e6dfd2);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 80px auto;
      background: #fffdf8;
      padding: 50px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-bottom: 0px;
      font-size: 42px;
      color: #4a3f35;
      letter-spacing: 1.5px;
    }
    .domain {
      font-size: 14px;
      color: #6e5d4d;
      margin-top: 8px;
      margin-bottom: 50px;
    }
    h2 {
      margin-bottom: 25px;
      font-size: 24px;
      color: #5c4a3d;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 20px 0;
    }
    a {
      display: inline-block;
      width: 180px;
      padding: 12px 0;
      font-size: 18px;
      text-decoration: none;
      border-radius: 8px;
      color: white;
      background-color: #8b6f47;
      transition: all 0.25s ease;
    }
    a:hover {
      background-color: #6f5636;
      transform: translateY(-2px);
      box-shadow: 0 5px 10px rgba(0,0,0,0.12);
    }
    @media (max-width: 700px) {
      .container {
        margin: 40px 20px;
        padding: 30px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>LangPower</h1>
  <br><br>
  <p class="domain">langpower.app</p>
  <h2>🇺🇸 English Lessons</h2>
  <ul>
    <li><a href="beginner/">Beginner</a></li>
    <li><a href="intermediate/">Intermediate</a></li>
  </ul>
</div>
</body>
</html>
